name: CI

on:
  push:
    branches: [main]
  pull_request:

# Tauri's src-tauri lives in a subdir, not the repo root, so every cargo
# step explicitly sets working-directory. The frontend (src/) is vanilla
# HTML/JS/CSS — no npm step.
defaults:
  run:
    shell: bash

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # webkit2gtk + supporting libs are required for the Tauri crate to
      # link on Linux. macOS uses system WKWebView and Windows uses
      # WebView2 (preinstalled on hosted runners), so this step is
      # ubuntu-only.
      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Check formatting
        working-directory: src-tauri
        run: cargo fmt --all --check

      # The `custom-protocol` default feature requires a Tauri runtime to
      # initialise; under `cargo test` that turns the 8 unit tests under
      # `#[cfg(test)] mod tests` into 0 visible tests. Disabling default
      # features keeps the lib tests visible. The full `--all-targets`
      # build still happens in clippy below.
      - name: Run lib tests
        working-directory: src-tauri
        run: cargo test --lib --no-default-features --locked

      - name: Run clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets --locked -- -D warnings
